components:
  terraform:
    eks/cluster/auto-mode:
      metadata:
        component: eks/cluster
      vars:
        enabled: true

        # EKS Auto Mode - AWS manages compute, networking, and storage
        auto_mode_enabled: true
        auto_mode_node_pools:
          - general-purpose
          - system

        # No managed node groups needed - Auto Mode handles compute
        managed_node_groups_enabled: false
        node_groups: {}

        # No Karpenter needed - Auto Mode includes managed Karpenter
        karpenter_iam_role_enabled: false
        fargate_profiles: {}

        access_config:
          authentication_mode: "API"
          bootstrap_cluster_creator_admin_permissions: true

        # Legacy settings
        legacy_fargate_1_role_per_profile_enabled: false

        addons_depends_on: false
        deploy_addons_to_fargate: false

        # Network access configuration
        allow_ingress_from_vpc_accounts: []
        public_access_cidrs: ["0.0.0.0/0"]
        allowed_cidr_blocks: []
        allowed_security_groups: []

        enabled_cluster_log_types: []

        availability_zone_abbreviation_type: fixed
        cluster_private_subnets_only: true
        cluster_encryption_config_enabled: true
        cluster_endpoint_private_access: true
        cluster_endpoint_public_access: true
        cluster_log_retention_period: 90
        oidc_provider_enabled: true

        cluster_kubernetes_version: "1.31"

        # Only non-Auto-Mode addon: aws-efs-csi-driver
        # vpc-cni, kube-proxy, coredns, and aws-ebs-csi-driver are managed by Auto Mode
        addons:
          aws-efs-csi-driver:
            addon_version: "v2.0.8-eksbuild.1"
